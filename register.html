<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account — Millfield Services</title><!-- change company name here -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="auth-page">
    <div class="auth-box">
        <a href="{{ url_for('home') }}" class="auth-back">← Back to Home</a>
        <h2 class="auth-form-title">Create Account</h2>
        <p class="auth-form-sub">Already have an account? <a href="{{ url_for('login') }}">Sign in</a></p>
        <!-- shows validation errors if something is wrong -->
        {% if errors %}<ul class="form-errors">{% for e in errors %}<li>{{ e }}</li>{% endfor %}</ul>{% endif %}
        <form action="{{ url_for('register') }}" method="POST" novalidate>
            <div class="form-row">
                <div class="form-group" style="margin-bottom:0">
                    <label class="form-label">First Name <span class="req">*</span></label>
                    <div class="input-wrap">
                        <span class="input-icon"><img src="{{ url_for('static', filename='images/icons/user.svg') }}" width="16" height="16" alt=""></span>
                        <!-- value keeps the field filled if validation fails -->
                        <input type="text" name="first_name" class="form-input" placeholder="John" value="{{ form.get('first_name', '') }}" required>
                    </div>
                </div>
                <div class="form-group" style="margin-bottom:0">
                    <label class="form-label">Last Name <span class="req">*</span></label>
                    <div class="input-wrap">
                        <span class="input-icon"><img src="{{ url_for('static', filename='images/icons/user.svg') }}" width="16" height="16" alt=""></span>
                        <input type="text" name="last_name" class="form-input" placeholder="Smith" value="{{ form.get('last_name', '') }}" required>
                    </div>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Email Address <span class="req">*</span></label>
                <div class="input-wrap">
                    <span class="input-icon"><img src="{{ url_for('static', filename='images/icons/mail.svg') }}" width="16" height="16" alt=""></span>
                    <input type="email" name="email" class="form-input" placeholder="john@example.com" value="{{ form.get('email', '') }}" required>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group" style="margin-bottom:0">
                    <label class="form-label">Phone <span class="req">*</span></label>
                    <div class="input-wrap">
                        <span class="input-icon"><img src="{{ url_for('static', filename='images/icons/phone.svg') }}" width="16" height="16" alt=""></span>
                        <input type="tel" name="phone" class="form-input" placeholder="07123 456789" value="{{ form.get('phone', '') }}" required>
                    </div>
                </div>
                <div class="form-group" style="margin-bottom:0">
                    <label class="form-label">Postcode <span class="req">*</span></label>
                    <div class="input-wrap">
                        <span class="input-icon"><img src="{{ url_for('static', filename='images/icons/map-pin.svg') }}" width="16" height="16" alt=""></span>
                        <input type="text" name="postcode" class="form-input" placeholder="M1 1AA" value="{{ form.get('postcode', '') }}" required>
                    </div>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Password <span class="req">*</span></label>
                <div class="input-wrap">
                    <span class="input-icon"><img src="{{ url_for('static', filename='images/icons/lock.svg') }}" width="16" height="16" alt=""></span>
                    <input type="password" name="password" class="form-input form-input--pw" placeholder="Minimum 8 characters" required minlength="8">
                    <button type="button" class="input-toggle" onclick="togglePw(this)"><img src="{{ url_for('static', filename='images/icons/eye.svg') }}" width="18" height="18" alt=""></button>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Confirm Password <span class="req">*</span></label>
                <div class="input-wrap">
                    <span class="input-icon"><img src="{{ url_for('static', filename='images/icons/lock.svg') }}" width="16" height="16" alt=""></span>
                    <input type="password" name="confirm_password" class="form-input form-input--pw" placeholder="Re-enter your password" required>
                    <button type="button" class="input-toggle" onclick="togglePw(this)"><img src="{{ url_for('static', filename='images/icons/eye.svg') }}" width="18" height="18" alt=""></button>
                </div>
            </div>
            <div style="margin: 8px 0 24px;">
                <div class="form-check"><input type="checkbox" name="terms" required> I agree to the <a href="#">Terms and Conditions</a> <span class="req">*</span></div>
            </div>
            <button type="submit" class="btn-submit">
                Create My Account <img src="{{ url_for('static', filename='images/icons/arrow-right.svg') }}" width="18" height="18" alt="" class="icon-white">
            </button>
        </form>
    </div>
</div>
<script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
