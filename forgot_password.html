<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password — Millfield Services</title><!-- change company name here -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="auth-page">
    <div class="forgot-card">
        <div class="forgot-icon">
            <img src="{{ url_for('static', filename='images/icons/lock.svg') }}" width="32" height="32" alt="">
        </div>
        <h1>Forgot Password?</h1>
        <p>Enter your email and we'll send you reset instructions.</p>
        <form action="{{ url_for('forgot_password') }}" method="POST">
            <div class="form-group" style="text-align:left;">
                <label class="form-label">Email Address</label>
                <input type="email" name="email" class="form-input" style="padding-left:12px;" placeholder="your@email.com" required>
            </div>
            <button type="submit" class="btn-submit" style="margin-top:8px;">
                Send Reset Link <img src="{{ url_for('static', filename='images/icons/arrow-right.svg') }}" width="20" height="20" alt="" class="icon-white">
            </button>
        </form>
        <a href="{{ url_for('login') }}" class="forgot-back">← Back to Login</a>
        <p class="forgot-label">MILLFIELD SERVICES</p><!-- change company name here -->
    </div>
</div>
<script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
